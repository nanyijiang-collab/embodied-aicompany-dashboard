            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;

            --accent-purple: #8b5cf6;
            --accent-green: #22c55e;

        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-blue);
            text-decoration: none;
            padding: 10px 16px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 24px;
            transition: all 0.2s;
        }
        .back-btn:hover { background: var(--bg-secondary); }
        
        /* Header */
        .company-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 32px;
            background: var(--bg-card);
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }
        
        .company-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .company-name {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .company-name-en {
            color: var(--text-secondary);
            font-size: 16px;
        }
        
        .company-website {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-blue);
            text-decoration: none;
            margin-top: 8px;
            font-size: 14px;
        }
        .company-website:hover { text-decoration: underline; }
        
        /* 数据路径标签 */
        .data-path-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 8px;
        }
        
        .data-path-teleop { background: rgba(236, 72, 153, 0.2); color: #ec4899; }
        .data-path-video { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
        .data-path-sim { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .data-path-real { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .data-path-hybrid { background: rgba(74, 158, 255, 0.2); color: #4a9eff; }
        
        /* 技术路径说明 */
        .tech-path-section {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        
        .tech-path-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: var(--bg-secondary);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .valuation-badge {
            text-align: right;
        }
        
        .valuation-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent-green);
        }
        
        .valuation-label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: 600;
        }
        
        /* Section */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Tags */
        .tag {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            margin: 4px;
        }
        
        .tag-segment { background: rgba(74, 158, 255, 0.2); color: var(--accent-blue); }
        .tag-region { background: rgba(139, 92, 246, 0.2); color: var(--accent-purple); }
        .tag-funding { background: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
        
        /* Team List */
        .team-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .team-card {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 16px 20px;
            min-width: 180px;
        }
        
        .team-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .team-title {
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        /* Investors */
        .investors-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .investor-tag {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
        }
        
        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 24px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-color);
        }
        
        .timeline-item {
            position: relative;
            padding-bottom: 24px;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 6px;
            width: 12px;
            height: 12px;
            background: var(--accent-blue);
            border-radius: 50%;
        }
        
        .timeline-date {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 4px;
        }
        
        .timeline-event {
            font-size: 15px;
            line-height: 1.6;
        }
        
        /* Events List */
        .events-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .event-item {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }
        
        .event-content { flex: 1; }
        
        .event-title {
            font-weight: 500;
            margin-bottom: 6px;
        }
        
        .event-meta {
            color: var(--text-secondary);
            font-size: 13px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .event-link {
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 13px;
        }
        .event-link:hover { text-decoration: underline; }
        
        .event-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;

            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }

            border: 1px solid var(--accent-red);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            color: var(--accent-red);

    </style>
</head>

                                <div class="team-name">${f.name}</div>
                                <div class="team-title">${f.title}</div>
                                ${f.bio ? `<div class="team-title" style="margin-top:6px;font-size:12px">${f.bio}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">💰 投资方</div>
                    <div class="investors-list">
                        ${company.investors.map(i => `
                            <span class="investor-tag">${i.name} <span style="color:var(--text-secondary)">${i.round}</span></span>
                        `).join('')}
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">📅 重大事件</div>
                    <div class="timeline">
                        ${company.milestones.map(m => `
                            <div class="timeline-item">
                                <div class="timeline-date">${m.date}</div>
                                <div class="timeline-event">${m.event}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">📰 最新动态 (${events.length}条)</div>
                    ${events.length > 0 ? `
                        <div class="events-list">
                            ${events.map(e => `
                                <div class="event-item">
                                    <div class="event-content">
                                        <div class="event-title">${e.title}</div>
                                        <div class="event-meta">
                                            <span>📅 ${e.date}</span>
                                            <span>📍 ${e.source || '未知来源'}</span>
                                            <span class="event-badge type-${e.type}">${typeNames[e.type] || e.type}</span>
                                        </div>
                                        ${e.source_url ? `<a href="${e.source_url}" target="_blank" class="event-link">阅读原文 →</a>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : '<div class="loading">暂无动态数据</div>'}
                </div>
            `;
        }
        
        // 启动
        if (companyName) {
            loadData();
        } else {
            document.getElementById('content').innerHTML = `
                <div class="error-msg">
                    <h2>未指定公司</h2>
                    <p style="margin-top:12px">请通过 ?name=公司名 访问</p>
                </div>
            `;
        }
    </script>
</body>
</html>
