<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司详情 - 具身智能监测</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --border-color: #2a2a3a;
            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;
            --accent-blue: #4a9eff;
            --accent-purple: #8b5cf6;
            --accent-green: #22c55e;
            --accent-orange: #f59e0b;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-blue);
            text-decoration: none;
            padding: 10px 16px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 24px;
            transition: all 0.2s;
        }
        .back-btn:hover { background: var(--bg-secondary); }
        
        /* Header */
        .company-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 32px;
            background: var(--bg-card);
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }
        
        .company-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .company-logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
        }
        
        .company-name {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .company-name-en {
            color: var(--text-secondary);
            font-size: 16px;
        }
        
        .company-website {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-blue);
            text-decoration: none;
            margin-top: 8px;
            font-size: 14px;
        }
        .company-website:hover { text-decoration: underline; }
        
        .valuation-badge {
            text-align: right;
        }
        
        .valuation-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent-green);
        }
        
        .valuation-label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: 600;
        }
        
        /* Section */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Tags */
        .tag {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            margin: 4px;
        }
        
        .tag-segment { background: rgba(74, 158, 255, 0.2); color: var(--accent-blue); }
        .tag-region { background: rgba(139, 92, 246, 0.2); color: var(--accent-purple); }
        .tag-funding { background: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
        
        /* Team List */
        .team-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .team-card {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 16px 20px;
            min-width: 180px;
        }
        
        .team-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .team-title {
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        /* Investors */
        .investors-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .investor-tag {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
        }
        
        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 24px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-color);
        }
        
        .timeline-item {
            position: relative;
            padding-bottom: 24px;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 6px;
            width: 12px;
            height: 12px;
            background: var(--accent-blue);
            border-radius: 50%;
        }
        
        .timeline-date {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 4px;
        }
        
        .timeline-event {
            font-size: 15px;
            line-height: 1.6;
        }
        
        /* Events List */
        .events-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .event-item {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }
        
        .event-content { flex: 1; }
        
        .event-title {
            font-weight: 500;
            margin-bottom: 6px;
        }
        
        .event-meta {
            color: var(--text-secondary);
            font-size: 13px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .event-link {
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 13px;
        }
        .event-link:hover { text-decoration: underline; }
        
        .event-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
        }
        
        .type-funding { background: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
        .type-product { background: rgba(74, 158, 255, 0.2); color: var(--accent-blue); }
        .type-tech { background: rgba(139, 92, 246, 0.2); color: var(--accent-purple); }
        .type-event { background: rgba(245, 158, 11, 0.2); color: var(--accent-orange); }
        .type-personnel { background: rgba(236, 72, 153, 0.2); color: #ec4899; }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--accent-red);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            color: var(--accent-red);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回监测看板</a>
        
        <div id="content">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <script>
        // 从URL获取公司名
        const params = new URLSearchParams(window.location.search);
        const companyName = params.get('name');
        
        // 类型名称映射
        const typeNames = {
            'funding': '融资',
            'product': '产品发布',
            'tech_breakthrough': '技术突破',
            'project': '项目落地',
            'event': '活动展会',
            'interview': '采访观点',
            'personnel': '人事动态',
            'other': '其他'
        };
        
        // 公司扩展数据（从rankingData加载）
        let companyData = null;
        
        async function loadData() {
            try {
                // 加载事件数据
                const eventsRes = await fetch('data/events.json');
                const events = await eventsRes.json();
                
                // 从index.html提取rankingData（这里简化处理，直接嵌入关键数据）
                const companyInfo = getCompanyInfo(companyName);
                
                if (!companyInfo) {
                    document.getElementById('content').innerHTML = `
                        <div class="error-msg">
                            <h2>未找到公司：${companyName}</h2>
                            <p style="margin-top:12px;color:var(--text-secondary)">请返回主页选择有效的公司</p>
                        </div>
                    `;
                    return;
                }
                
                companyData = companyInfo;
                
                // 筛选该公司的事件
                const companyEvents = events.filter(e => 
                    e.company === companyName || 
                    (e.company && e.company.includes(companyName)) ||
                    (companyInfo.name_en && e.company && e.company.includes(companyInfo.name_en))
                ).slice(0, 10);
                
                renderCompanyPage(companyInfo, companyEvents);
                
            } catch (err) {
                console.error(err);
                document.getElementById('content').innerHTML = `
                    <div class="error-msg">
                        <h2>数据加载失败</h2>
                        <p style="margin-top:12px;color:var(--text-secondary)">${err.message}</p>
                    </div>
                `;
            }
        }
        
        function getCompanyInfo(name) {
            // 公司完整信息库（可扩展）
            const companies = {
                '宇树科技': {
                    name: '宇树科技',
                    name_en: 'Unitree Robotics',
                    website: 'https://unitree.com',
                    founded: '2016年',
                    headquarters: '杭州',
                    segment: '人形整机/四足机器人',
                    isOverseas: false,
                    valuation: '420亿人民币',
                    valuationCNY: 420,
                    currency: '人民币',
                    latest: 'IPO募资42亿',
                    date: '2026.03',
                    founders: [
                        {name: '王兴兴', title: '创始人/CEO/CTO', bio: '1990年生，浙江宁波余姚人；浙江理工大学本科，上海大学机械工程硕士；2016年创立宇树科技'},
                        {name: '陈立', title: '联合创始人', bio: '2025年10月代表宇树在清华有为青年公开课演讲'}
                    ],
                    investors: [
                        {name: '红杉中国', round: 'A轮'},
                        {name: '源码资本', round: 'B轮'},
                        {name: '深创投', round: 'C轮'}
                    ],
                    milestones: [
                        {date: '2017.01', event: '发布首款四足机器人Laikago'},
                        {date: '2021.06', event: '发布消费级四足机器人Go1'},
                        {date: '2023.08', event: '发布人形机器人H1'},
                        {date: '2025.02', event: 'H1人形机器人迭代升级'},
                        {date: '2026.03', event: '科创板IPO，募资42亿'}
                    ]
                },
                '灵御智能': {
                    name: '灵御智能',
                    name_en: 'Lingyu Intelligence',
                    website: 'https://www.lingyuai.com',
                    founded: '2025年2月',
                    headquarters: '北京',
                    segment: '具身智能基础设施/遥操作',
                    isOverseas: false,
                    valuation: '数千万人民币',
                    valuationCNY: 1,
                    currency: '人民币',
                    latest: '天使轮',
                    date: '2026.03',
                    founders: [
                        {name: '金戈', title: '联合创始人/CEO', bio: '清华大学自动化系学士，清华经管学院MBA；前远镜创投管理合伙人，奥量光子副总；2025年2月创立灵御智能'}
                    ],
                    investors: [
                        {name: '华映资本', round: '种子+轮'},
                        {name: '银河创新资本', round: '天使轮'},
                        {name: '英诺天使基金', round: '种子轮'}
                    ],
                    milestones: [
                        {date: '2025.02', event: '公司成立，专注具身智能基础设施'},
                        {date: '2025.09', event: '完成千万元级种子+轮融资'},
                        {date: '2026.03', event: '完成数千万元天使轮融资'},
                        {date: '2026.04', event: '遥操作系统延迟降至50ms'}
                    ]
                },
                'Generalist': {
                    name: 'Generalist',
                    name_en: 'Generalist AI',
                    website: 'https://generalist.ai',
                    founded: '2023年',
                    headquarters: '美国加州',
                    segment: '具身AI/Physical AI',
                    isOverseas: true,
                    valuation: '未披露',
                    valuationCNY: 0,
                    currency: '美元',
                    latest: 'GEN-1发布',
                    date: '2026.04',
                    founders: [
                        {name: 'Pete Florence', title: 'CEO/创始人', bio: '前DeepMind高级研究科学家，参与PaLM-E、RT-2两大里程碑项目；2025年3月创立Generalist AI'},
                        {name: '待补充', title: 'CTO', bio: '核心团队来自OpenAI、Google DeepMind、Waymo、波士顿动力等公司'}
                    ],
                    investors: [
                        {name: 'NVIDIA', round: '种子轮'}
                    ],
                    milestones: [
                        {date: '2023年', event: '公司成立'},
                        {date: '2025.03', event: 'Pete Florence离开DeepMind创业'},
                        {date: '2025.03', event: '获NVIDIA投资'},
                        {date: '2026.04', event: '发布GEN-1具身基础模型，成功率99%'}
                    ]
                }
            };
            
            // 精确匹配
            if (companies[name]) return companies[name];
            
            // 模糊匹配
            for (const [key, info] of Object.entries(companies)) {
                if (name.includes(key) || key.includes(name)) return info;
            }
            
            // 英文名匹配
            for (const [key, info] of Object.entries(companies)) {
                if (info.name_en && info.name_en.toLowerCase().includes(name.toLowerCase())) {
                    return info;
                }
            }
            
            return null;
        }
        
        function renderCompanyPage(company, events) {
            const initials = company.name.slice(0, 2);
            const currencySymbol = company.currency === '美元' ? '💵' : '💴';
            
            document.title = `${company.name} - 公司详情`;
            
            document.getElementById('content').innerHTML = `
                <div class="company-header">
                    <div class="company-title">
                        <div class="company-logo">${initials}</div>
                        <div>
                            <div class="company-name">${company.name}</div>
                            <div class="company-name-en">${company.name_en}</div>
                            <a href="${company.website}" target="_blank" class="company-website">
                                🌐 ${company.website.replace('https://', '')}
                            </a>
                        </div>
                    </div>
                    <div class="valuation-badge">
                        <div class="valuation-value">${company.valuation}</div>
                        <div class="valuation-label">估值 ${currencySymbol}</div>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">成立时间</div>
                        <div class="stat-value">${company.founded}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">总部</div>
                        <div class="stat-value">${company.headquarters}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">赛道</div>
                        <div class="stat-value">${company.segment}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">最新融资</div>
                        <div class="stat-value">${company.latest}</div>
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">👥 创始团队</div>
                    <div class="team-list">
                        ${company.founders.map(f => `
                            <div class="team-card">
                                <div class="team-name">${f.name}</div>
                                <div class="team-title">${f.title}</div>
                                ${f.bio ? `<div class="team-title" style="margin-top:6px;font-size:12px">${f.bio}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">💰 投资方</div>
                    <div class="investors-list">
                        ${company.investors.map(i => `
                            <span class="investor-tag">${i.name} <span style="color:var(--text-secondary)">${i.round}</span></span>
                        `).join('')}
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">📅 重大事件</div>
                    <div class="timeline">
                        ${company.milestones.map(m => `
                            <div class="timeline-item">
                                <div class="timeline-date">${m.date}</div>
                                <div class="timeline-event">${m.event}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">📰 最新动态 (${events.length}条)</div>
                    ${events.length > 0 ? `
                        <div class="events-list">
                            ${events.map(e => `
                                <div class="event-item">
                                    <div class="event-content">
                                        <div class="event-title">${e.title}</div>
                                        <div class="event-meta">
                                            <span>📅 ${e.date}</span>
                                            <span>📍 ${e.source || '未知来源'}</span>
                                            <span class="event-badge type-${e.type}">${typeNames[e.type] || e.type}</span>
                                        </div>
                                        ${e.source_url ? `<a href="${e.source_url}" target="_blank" class="event-link">阅读原文 →</a>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : '<div class="loading">暂无动态数据</div>'}
                </div>
            `;
        }
        
        // 启动
        if (companyName) {
            loadData();
        } else {
            document.getElementById('content').innerHTML = `
                <div class="error-msg">
                    <h2>未指定公司</h2>
                    <p style="margin-top:12px">请通过 ?name=公司名 访问</p>
                </div>
            `;
        }
    </script>
</body>
</html>
