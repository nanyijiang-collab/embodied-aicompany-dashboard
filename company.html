        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;

            --border-color: #2a2a3a;
            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;
            --accent-blue: #4a9eff;

        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

            padding: 20px;

        /* Back Button */
        .back-btn {
            display: inline-flex;

            gap: 8px;
            color: var(--accent-blue);
            text-decoration: none;
            padding: 10px 16px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 24px;
            transition: all 0.2s;
        }
        .back-btn:hover { background: var(--bg-secondary); }
        
        /* Header */
        .company-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 32px;
            background: var(--bg-card);
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }
        
        .company-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .company-name {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .company-name-en {
            color: var(--text-secondary);
            font-size: 16px;
        }
        
        .company-website {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-blue);
            text-decoration: none;
            margin-top: 8px;
            font-size: 14px;
        }
        .company-website:hover { text-decoration: underline; }

            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 8px;
        }

        .data-path-sim { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .data-path-real { background: rgba(34, 197, 94, 0.2); color: #22c55e; }

            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: var(--bg-secondary);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);

        .valuation-label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;

            margin-bottom: 24px;

        .timeline {
            position: relative;
            padding-left: 24px;

            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-color);

        .timeline-item {
            position: relative;
            padding-bottom: 24px;

            content: '';

            left: -20px;
            top: 6px;

            height: 12px;

</head>

                '仿真+遥操作': '结合仿真合成和遥操作采集的数据，兼顾规模和质量。仿真数据用于预训练，遥操作数据用于微调。',
                '物理世界': '直接在实际机器人或物理环境中采集数据。真实性最高但成本高、风险大，适合落地验证。',
                '混合': '综合使用多种数据获取方式，兼顾数据规模、质量和泛化能力。'
            };
            return descriptions[path] || descriptions['混合'];
        }
        
        function renderCompanyPage(company, events) {
            const currencySymbol = company.currency === '美元' ? '💵' : '💴';
            
            // 解析数据路径
            const segmentParts = (company.segment || '').split(' / ');
            const mainSegment = segmentParts[0] || '';
            const dataPath = segmentParts[1] || '混合';
            
            // 数据路径样式映射
            const pathClassMap = {
                '遥操作': 'data-path-teleop',
                '视频学习': 'data-path-video',
                '仿真': 'data-path-sim',
                '仿真+遥操作': 'data-path-sim',
                '物理世界': 'data-path-real',
                '混合': 'data-path-hybrid'
            };
            const pathClass = pathClassMap[dataPath] || 'data-path-hybrid';
            
            // 数据路径图标
            const pathIconMap = {
                '遥操作': '🎮',
                '视频学习': '🎬',
                '仿真': '🔬',
                '仿真+遥操作': '🔬',
                '物理世界': '🌍',
                '混合': '🔀'
            };
            const pathIcon = pathIconMap[dataPath] || '🔀';
            
            document.title = `${company.name} - 公司详情`;
            
            document.getElementById('content').innerHTML = `
                <div class="company-header">
                    <div class="company-title">
                        <div>
                            <div class="company-name">${company.name}</div>
                            <div class="company-name-en">${company.name_en}</div>
                            <a href="${company.website}" target="_blank" class="company-website">
                                🌐 ${company.website.replace('https://', '')}
                            </a>
                            <div class="tech-path-section">
                                <span class="data-path-tag ${pathClass}">${pathIcon} ${dataPath}</span>
                            </div>
                        </div>
                    </div>
                    <div class="valuation-badge">
                        <div class="valuation-value">${company.valuation}</div>
                        <div class="valuation-label">估值 ${currencySymbol}</div>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">公司定位</div>
                        <div class="stat-value">${mainSegment}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">成立时间</div>
                        <div class="stat-value">${company.founded}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">总部</div>
                        <div class="stat-value">${company.headquarters}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">最新融资</div>
                        <div class="stat-value">${company.latest}</div>
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">🔍 技术路径说明</div>
                    <div style="color: var(--text-secondary); line-height: 1.8;">
                        <p><strong>公司定位：</strong>${mainSegment}</p>
                        <p><strong>数据获取方式：</strong>${dataPath}</p>
                        <p style="margin-top: 12px; font-size: 13px;">
                            ${getDataPathDescription(dataPath)}
                        </p>
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">👥 创始团队</div>
                    <div class="team-list">
                        ${company.founders.map(f => `
                            <div class="team-card">
                                <div class="team-name">${f.name}</div>
                                <div class="team-title">${f.title}</div>
                                ${f.bio ? `<div class="team-title" style="margin-top:6px;font-size:12px">${f.bio}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">💰 投资方</div>
                    <div class="investors-list">
                        ${company.investors.map(i => `
                            <span class="investor-tag">${i.name} <span style="color:var(--text-secondary)">${i.round}</span></span>
                        `).join('')}
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">📅 重大事件</div>
                    <div class="timeline">
                        ${company.milestones.map(m => `
                            <div class="timeline-item">
                                <div class="timeline-date">${m.date}</div>
                                <div class="timeline-event">${m.event}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">📰 最新动态 (${events.length}条)</div>
                    ${events.length > 0 ? `
                        <div class="events-list">
                            ${events.map(e => `
                                <div class="event-item">
                                    <div class="event-content">
                                        <div class="event-title">${e.title}</div>
                                        <div class="event-meta">
                                            <span>📅 ${e.date}</span>
                                            <span>📍 ${e.source || '未知来源'}</span>
                                            <span class="event-badge type-${e.type}">${typeNames[e.type] || e.type}</span>
                                        </div>
                                        ${e.source_url ? `<a href="${e.source_url}" target="_blank" class="event-link">阅读原文 →</a>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : '<div class="loading">暂无动态数据</div>'}
                </div>
            `;
        }
        
        // 启动
        if (companyName) {
            loadData();
        } else {
            document.getElementById('content').innerHTML = `
                <div class="error-msg">
                    <h2>未指定公司</h2>
                    <p style="margin-top:12px">请通过 ?name=公司名 访问</p>
                </div>
            `;
        }
    </script>
</body>
</html>
