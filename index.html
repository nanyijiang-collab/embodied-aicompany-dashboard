<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>具身智能媒体监测看板</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --border-color: #2a2a3a;
            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;
            --accent-blue: #4a9eff;
            --accent-purple: #8b5cf6;
            --accent-green: #22c55e;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .header-brand .logo {
            height: 40px;
            width: auto;
        }
        
        .header-brand h1 {
            margin: 0;
        }
        
        .header h1 .icon {
            font-size: 28px;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: var(--accent-blue);
            color: white;
        }
        
        .btn-primary:hover {
            background: #3a8eef;
        }
        
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .btn-secondary:hover {
            background: var(--bg-secondary);
        }
        
        .btn-warning {
            background: var(--accent-orange);
            color: white;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .stat-card .label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .stat-card .trend {
            font-size: 12px;
            margin-top: 8px;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        
        .trend.up { background: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
        .trend.down { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: var(--bg-secondary);
            padding: 4px;
            border-radius: 10px;
            width: fit-content;
        }
        
        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
            border: none;
            background: transparent;
        }
        
        .tab:hover {
            color: var(--text-primary);
        }
        
        .tab.active {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        
        .tab-badge {
            background: var(--accent-red);
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 6px;
        }
        
        /* Filters */
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-group label {
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        select, input {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 13px;
        }
        
        select {
            cursor: pointer;
        }
        
        input {
            width: 200px;
        }
        
        /* Table */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .table-wrapper {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        th {
            background: var(--bg-secondary);
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        td {
            font-size: 14px;
        }
        
        tr:hover {
            background: rgba(74, 158, 255, 0.05);
        }
        
        .company-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .company-link {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .company-link:hover {
            color: var(--accent-blue);
            text-decoration: underline;
        }
        
        .company-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .badge-cn { background: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
        .badge-us { background: rgba(74, 158, 255, 0.2); color: var(--accent-blue); }
        .badge-eu { background: rgba(139, 92, 246, 0.2); color: var(--accent-purple); }
        
        .type-badge {
            display: inline-block;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }
        
        .type-funding { background: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
        .type-product { background: rgba(74, 158, 255, 0.2); color: var(--accent-blue); }
        .type-tech { background: rgba(139, 92, 246, 0.2); color: var(--accent-purple); }
        .type-project { background: rgba(245, 158, 11, 0.2); color: var(--accent-orange); }
        .type-event { background: rgba(236, 72, 153, 0.2); color: #ec4899; }
        .type-interview { background: rgba(156, 163, 175, 0.2); color: #9ca3af; }
        .type-personnel { background: rgba(236, 72, 153, 0.2); color: #ec4899; }
        .type-other { background: rgba(107, 114, 128, 0.2); color: #6b7280; }
        
        .title-cell {
            max-width: 400px;
        }
        
        .title-cell .main-title {
            margin-bottom: 4px;
        }
        
        .title-cell .en-title {
            font-size: 12px;
            color: var(--text-secondary);
            font-style: italic;
        }
        
        .source-link {
            color: var(--accent-blue);
            text-decoration: none;
        }
        
        .source-link:hover {
            text-decoration: underline;
        }
        
        .media-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        
        .media-tag {
            font-size: 11px;
            padding: 2px 6px;
            background: var(--bg-secondary);
            border-radius: 4px;
            color: var(--text-secondary);
        }
        
        .media-tag.more {
            background: var(--accent-orange);
            color: white;
        }
        
        /* Funding Details */
        .funding-amount {
            font-weight: 600;
            color: var(--accent-green);
        }
        
        .valuation-date {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        .segment-tag {
            display: inline-block;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(74, 158, 255, 0.15);
            color: var(--accent-blue);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .segment-tag:hover {
            background: rgba(74, 158, 255, 0.3);
            transform: scale(1.05);
        }
        
        .valuation {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .investors {
            font-size: 13px;
        }
        
        /* Ranking Table */
        .rank-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }
        
        .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
        .rank-3 { background: linear-gradient(135deg, #d97706, #b45309); color: #fff; }
        .rank-default { background: var(--bg-secondary); color: var(--text-secondary); }
        
        .valuation-bar {
            width: 100px;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }
        
        .valuation-fill {
            height: 100%;
            background: var(--accent-blue);
            border-radius: 4px;
        }
        
        /* New Companies Panel */
        .new-companies-panel {
            background: var(--bg-card);
            border: 1px solid var(--accent-orange);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .new-companies-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .new-companies-header h3 {
            color: var(--accent-orange);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .company-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .company-info {
            flex: 1;
        }
        
        .company-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .company-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .company-meta a {
            color: var(--accent-blue);
            text-decoration: none;
        }
        
        .company-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn-add {
            padding: 6px 12px;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn-reject {
            padding: 6px 12px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .category-select {
            font-size: 12px;
            padding: 4px 8px;
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 16px;
        }
        
        .pagination.hidden {
            display: none !important;
        }
        
        .pagination button {
            padding: 8px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
        }
        
        .pagination button:hover:not(:disabled) {
            background: var(--bg-card);
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination span {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        /* Last Updated */
        .last-updated {
            text-align: right;
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 16px;
        }
        
        /* Hidden */
        .hidden {
            display: none !important;
        }
        
        /* Admin-only (hidden by default) */
        .admin-only {
            display: none;
        }
        
        /* Show admin elements when isAdmin=true */
        body.admin-mode .admin-only {
            display: inline-block;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
        }
        
        .modal h3 {
            margin-bottom: 16px;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <img src="assets/logo-fmc3.png" alt="FMC³ Robotics" class="logo">
                <h1>
                    <span data-i18n="title">FMC³ Robotics 具身智能媒体监测看板</span>
                </h1>
            </div>
            <div class="header-actions">
                <button id="langToggle" class="btn btn-secondary" onclick="toggleLanguage()" style="min-width: 80px;">
                    🌐 EN
                </button>
                <button class="btn btn-secondary" onclick="refreshData()">
                    🔄 <span data-i18n="refresh">刷新</span>
                </button>
                <button id="btnDetectNewCompanies" class="btn btn-warning admin-only" onclick="detectNewCompanies()">
                    🔍 <span data-i18n="detect">发现新公司</span>
                </button>
                <button id="btnDownloadPending" class="btn btn-success admin-only" onclick="downloadPendingCompanies()">
                    📥 <span data-i18n="download">下载待添加公司</span>
                </button>
            </div>
        </header>
        
        <!-- New Companies Panel -->
        <div id="newCompaniesPanel" class="new-companies-panel hidden">
            <div class="new-companies-header">
                <h3>
                    <span>🆕</span>
                    <span data-i18n="newCompanies">疑似新增企业</span>
                    <span id="newCompaniesCount" class="tab-badge">0</span>
                </h3>
                <button class="btn btn-secondary" onclick="closeNewCompaniesPanel()"><span data-i18n="close">关闭</span></button>
            </div>
            <div id="newCompaniesList">
                <!-- 新公司列表将在这里渲染 -->
            </div>
        </div>
        
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card" style="cursor:pointer;" onclick="window.location.href='companies.html'">
                <div class="value" id="totalCompanies" style="text-decoration:none;">42</div>
                <div class="label" data-i18n="monitored">监控公司</div>
                <div class="trend up" id="companiesTrend" style="display:none">+0</div>
                <div style="font-size:10px;color:#888;margin-top:4px;">点击查看列表 →</div>
            </div>
            <div class="stat-card">
                <div class="value" id="totalEvents">0</div>
                <div class="label" data-i18n="totalEvents">总事件数</div>
                <div class="trend up" id="eventsTrend" style="display:none">+0</div>
            </div>
            <div class="stat-card">
                <div class="value" id="fundingCount">0</div>
                <div class="label" data-i18n="fundingEvents">融资事件</div>
                <div class="trend up" id="fundingTrend">+0 <span data-i18n="thisMonth">本月</span></div>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="all" data-i18n="allEvents">全部事件</button>
            <button class="tab" data-tab="funding" data-i18n="funding">融资动态</button>
            <button class="tab" data-tab="ranking">🏆 <span data-i18n="ranking">估值排行</span></button>
        </div>
        
        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label data-i18n="region">地区:</label>
                <select id="regionFilter">
                    <option value="all">All</option>
                    <option value="domestic">🇨🇳 China</option>
                    <option value="overseas_us">🇺🇸 US</option>
                    <option value="overseas_eu">🇪🇺 Europe</option>
                </select>
            </div>
            <div class="filter-group">
                <label data-i18n="type">类型:</label>
                <select id="typeFilter">
                    <option value="all">All</option>
                    <option value="funding">💰 Funding</option>
                    <option value="product">📦 Product Launch</option>
                    <option value="tech_breakthrough">🔬 Tech Breakthrough</option>
                    <option value="project">🤝 Project Launch</option>
                    <option value="event">🎪 Event / Exhibition</option>
                    <option value="interview">🎤 Interview / Opinion</option>
                    <option value="personnel">👤 Personnel</option>
                    <option value="other">📌 Other</option>
                </select>
            </div>
            <div class="filter-group">
                <label data-i18n="search">搜索:</label>
                <input type="text" id="searchInput" data-placeholder-i18n="searchPlaceholder" placeholder="搜索公司或关键词...">
            </div>
        </div>
        
        <!-- Main Table -->
        <div class="table-container">
            <div class="table-wrapper">
                <table id="eventsTable">
                    <thead>
                        <tr>
                            <th style="width: 100px;" data-i18n="date">日期</th>
                            <th style="width: 120px;" data-i18n="company">公司</th>
                            <th style="width: 100px;" data-i18n="type">类型</th>
                            <th data-i18n="eventTitle">事件标题</th>
                            <th style="width: 100px;" data-i18n="source">来源</th>
                            <th style="width: 150px;" data-i18n="mediaCoverage">媒体覆盖</th>
                            <th style="width: 200px;" data-i18n="fundingDetails">融资详情</th>
                        </tr>
                    </thead>
                    <tbody id="eventsBody">
                        <!-- 数据将在这里渲染 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Ranking Table (Hidden) -->
        <div class="table-container hidden" id="rankingTable">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 80px;" data-i18n="rank">排名</th>
                            <th style="width: 180px;" data-i18n="company">公司</th>
                            <th data-i18n="valuation">估值</th>
                            <th style="width: 200px;" data-i18n="latestFunding">最新融资</th>
                            <th data-i18n="segment">所属赛道</th>
                        </tr>
                    </thead>
                    <tbody id="rankingBody">
                        <!-- 数据将在这里渲染 -->
                    </tbody>
                </table>
            </div>
            <!-- 估值排行分页 -->
            <div class="pagination" id="rankingPagination">
                <button class="btn-secondary" id="rankingPrevPage" onclick="prevRankingPage()">← <span data-i18n="prev">上一页</span></button>
                <span id="rankingPageInfo">Page 1 / 3</span>
                <button class="btn-secondary" id="rankingNextPage" onclick="nextRankingPage()"><span data-i18n="next">下一页</span> →</button>
            </div>
        </div>
        
        <!-- Pagination -->
        <div class="pagination" id="pagination">
            <button id="prevPage">← <span data-i18n="prev">上一页</span></button>
            <span id="pageInfo">Page 1</span>
            <button id="nextPage"><span data-i18n="next">下一页</span> →</button>
        </div>
        
        <div class="last-updated">
            <span data-i18n="lastUpdated">最后更新</span>: <span id="lastUpdated">--</span>
        </div>
        
        <!-- 翻译来源备注 -->
        <div id="translationNote" class="translation-note" style="text-align: center; color: var(--text-secondary); font-size: 11px; margin-top: 8px; display: none;">
            * English titles translated by Google Translate
        </div>
    </div>

    <script>
        // ==================== 语言切换 ====================
        const i18n = {
            'zh': {
                'title': 'FMC³ Robotics 具身智能媒体监测看板',
                'refresh': '刷新',
                'detect': '发现新公司',
                'download': '下载待添加公司',
                'newCompanies': '疑似新增企业',
                'close': '关闭',
                'monitored': '监控公司',
                'totalEvents': '总事件数',
                'fundingEvents': '融资事件',
                'thisMonth': '本月',
                'allEvents': '全部事件',
                'funding': '融资动态',
                'ranking': '估值排行',
                'region': '地区:',
                'domestic': '国内',
                'us': '美国',
                'eu': '欧洲',
                'type': '类型:',
                't_funding': '融资',

        // ==================== 标签页 ====================
        function initTabs() {
            // 恢复保存的 tab 状态
            const savedState = sessionStorage.getItem('indexViewState');
            let savedScrollY = 0;
            if (savedState) {
                try {
                    const state = JSON.parse(savedState);
                    if (state.currentTab) {
                        currentTab = state.currentTab;
                    }
                    // 恢复滚动位置
                    if (state.scrollY) {
                        savedScrollY = state.scrollY;
                    }
                } catch (e) {}
            }
            
            // 设置初始激活状态
            document.querySelectorAll('.tab').forEach(tab => {
                if (tab.dataset.tab === currentTab) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
            
            // 显示/隐藏对应内容
            if (currentTab === 'ranking') {
                document.getElementById('rankingTable').classList.remove('hidden');
                document.getElementById('pagination').classList.add('hidden');
            } else {
                document.getElementById('rankingTable').classList.add('hidden');
                document.getElementById('pagination').classList.remove('hidden');
            }
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentTab = this.dataset.tab;
                    currentPage = 1;
                    
                    // 点击标签自动设置筛选
                    if (currentTab === 'funding') {
                        document.getElementById('typeFilter').value = 'funding';
                    } else {
                        document.getElementById('typeFilter').value = 'all';
                    }
                    
                    applyFilters();
                    saveViewState();
                });
            });
            
            // 恢复滚动位置（在数据加载后）
            if (savedScrollY > 0) {
                requestAnimationFrame(() => {
                    window.scrollTo(0, savedScrollY);
                });
            }

            if (savedState) {
                try {
                    const state = JSON.parse(savedState);
                    if (state.region) document.getElementById('regionFilter').value = state.region;
                    if (state.type) document.getElementById('typeFilter').value = state.type;
                    if (state.search) document.getElementById('searchInput').value = state.search;
                    if (state.currentPage) currentPage = state.currentPage;
                } catch (e) {}
            }
            
            document.getElementById('regionFilter').addEventListener('change', () => {
                currentPage = 1;
                applyFilters();
                saveViewState();
            });
            
            document.getElementById('typeFilter').addEventListener('change', () => {
                currentPage = 1;
                applyFilters();
                saveViewState();
            });
            
            document.getElementById('searchInput').addEventListener('input', debounce(() => {
                currentPage = 1;
                applyFilters();
                saveViewState();
            }, 300));
        }
        
        // 保存视图状态到 sessionStorage
        function saveViewState() {
            const scrollY = window.scrollY || document.documentElement.scrollTop;
            const state = {
                currentTab: currentTab,
                region: document.getElementById('regionFilter').value,
                type: document.getElementById('typeFilter').value,
                search: document.getElementById('searchInput').value,
                currentPage: currentPage,
                scrollY: scrollY,
                rankingPage: parseInt(sessionStorage.getItem('rankingPage') || '1'),
                rankingScrollY: currentTab === 'ranking' ? scrollY : 0
            };
            sessionStorage.setItem('indexViewState', JSON.stringify(state));
        }
        
        function applyFilters() {
            const region = document.getElementById('regionFilter').value;
            const type = document.getElementById('typeFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            // 获取需要展示的公司列表
            let displayCompanies = new Set();
            if (region === 'all') {
                Object.values(companyRegions).forEach(arr => arr.forEach(c => displayCompanies.add(c)));
            } else if (region === 'domestic') {
                ['domestic_vla', 'domestic_control'].forEach(k => companyRegions[k].forEach(c => displayCompanies.add(c)));
            } else if (region === 'overseas_us') {
                companyRegions['overseas_vla'].forEach(c => displayCompanies.add(c));
            } else if (region === 'overseas_eu') {
                companyRegions['overseas_other'].forEach(c => displayCompanies.add(c));
            }
            
            filteredEvents = allEvents.filter(event => {
                // 地区筛选
                if (!displayCompanies.has(event.company)) return false;
                
                // 类型筛选
                if (type !== 'all' && event.type !== type) {
                    return false;
                }
                
                // 搜索筛选
                if (search) {
                    const matchCompany = event.company.toLowerCase().includes(search);
                    const matchTitle = (event.title + (event.title_en || '')).toLowerCase().includes(search);
                    const matchSummary = (event.summary || '').toLowerCase().includes(search);
                    if (!matchCompany && !matchTitle && !matchSummary) return false;
                }
                
                return true;
            });
            
            // 按日期倒序排序（最新的在最上面）
            filteredEvents.sort((a, b) => {
                const dateA = a.date || '0000-00-00';
                const dateB = b.date || '0000-00-00';
                return dateB.localeCompare(dateA);
            });
            
            renderTable();
            renderRanking();
        }

            // 根据当前Tab显示/隐藏表格
            if (currentTab === 'ranking') {
                tableContainer.classList.add('hidden');
                rankingTable.classList.remove('hidden');
                document.getElementById('pagination').classList.add('hidden');
                document.getElementById('rankingPagination').classList.remove('hidden');
                return;
            } else {
                tableContainer.classList.remove('hidden');
                rankingTable.classList.add('hidden');
                document.getElementById('pagination').classList.remove('hidden');
                document.getElementById('rankingPagination').classList.add('hidden');
            }
            
            // 计算分页
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredEvents.slice(start, end);
            
            if (pageData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7">
                            <div class="empty-state">
                                <div class="icon">📭</div>
                                <div data-i18n="noData">暂无数据</div>
                            </div>
                        </td>
                    </tr>
                `;
                // Translate empty state
                document.querySelector('[data-i18n="noData"]').textContent = i18n[currentLang]['noData'];
                return;
            }
            
            tbody.innerHTML = pageData.map(event => {
                const badge = getRegionBadge(event.company);
                const typeBadge = getTypeBadge(event.type);
                const mediaTags = renderMediaTags(event.media_sources);
                const fundingDetails = renderFundingDetails(event);
                
                // 英文模式下使用英文公司名和英文标题
                const displayCompany = currentLang === 'en' ? getCompanyNameEN(event.company) : event.company;
                
                let titleHtml = '';
                if (currentLang === 'en' && event.title_en) {
                    // 英文模式：有英文标题 → 只显示英文
                    titleHtml = `
                        <div class="main-title">

        function renderRanking() {
            const tbody = document.getElementById('rankingBody');

                '服务机器人': 'Service Robot',
                '数据/仿真': 'Data/Simulation',

                '协作机器人': 'Collaborative Robot',
                '芯片/平台': 'Chip/Platform',

            tbody.innerHTML = pageData.map((item, index) => {
                const globalIndex = start + index;
                const rankClass = globalIndex < 3 ? `rank-${globalIndex + 1}` : 'rank-default';
                const isOverseas = item.isOverseas || ['Figure AI', 'Apptronik', '1X Technologies', 'Agility Robotics', 'Physical Intelligence', 'Skild AI', 'Sanctuary AI', 'Field AI', 'Mimic Robotics', 'Anybotics', 'Skydio', 'Hexagon', '英伟达', 'NVIDIA'].some(name => item.company.includes(name));
                // 英文模式下显示英文公司名
                const displayName = currentLang === 'en' ? getCompanyNameEN(item.company) : item.company;
                // 英文模式下显示英文赛道名
                const displaySegment = currentLang === 'en' ? (segmentNamesEN[item.segment] || item.segment) : item.segment;
                // 英文模式下显示英文融资信息
                const displayValuation = currentLang === 'en' 
                    ? item.valuation
                        .replace(/约/g, '~')
                        .replace(/亿美元/g, 'B USD')
                        .replace(/亿港元/g, 'B HKD')
                        .replace(/亿人民币/g, 'B CNY')
                        .replace(/亿/g, 'B')
                        .replace(/上市~/g, 'Listed ~')
                        .replace(/上市/g, 'Listed')
                        .replace(/非上市/g, 'Unlisted')
                        .replace(/万亿/g, 'T')
                    : item.valuation;
                const displayLatest = currentLang === 'en' ? (item.latest_en || item.latest) : item.latest;
                
                return `
                    <tr>
                        <td>

        // 点击赛道标签，筛选该公司事件
        function filterByCompany(company) {
            // 切换到全部事件标签
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.tab[data-tab="all"]').classList.add('active');
            currentTab = 'all';
            
            // 设置搜索关键词
            document.getElementById('searchInput').value = company;
            document.getElementById('typeFilter').value = 'all';
            document.getElementById('regionFilter').value = 'all';
            
            currentPage = 1;
            applyFilters();
        }
        
        // 估值排行翻页
        function prevRankingPage() {
            const rankingPage = parseInt(sessionStorage.getItem('rankingPage') || '1');
            if (rankingPage > 1) {
                sessionStorage.setItem('rankingPage', rankingPage - 1);
                renderRanking();
                saveViewState();
            }
        }
        
        function nextRankingPage() {
            const rankingPage = parseInt(sessionStorage.getItem('rankingPage') || '1');
            const totalPages = Math.ceil(rankingData.length / 10);
            if (rankingPage < totalPages) {
                sessionStorage.setItem('rankingPage', rankingPage + 1);
                renderRanking();
                saveViewState();
            }
        }
        
        function getRegionBadge(company) {
            if (companyRegions['domestic_vla'].includes(company) || companyRegions['domestic_control'].includes(company)) {
                return '<span class="company-badge badge-cn">🇨🇳</span>';
            } else if (companyRegions['overseas_vla'].includes(company)) {
                return '<span class="company-badge badge-us">🇺🇸</span>';
            } else {
                return '<span class="company-badge badge-eu">🇪🇺</span>';
            }
        }
        
        function getTypeBadge(type) {
            const typeClass = `type-${type}`;
            const typeName = typeNames[type] || type;
            return `<span class="type-badge ${typeClass}">${typeName}</span>`;
        }
        
        function renderMediaTags(mediaSources) {
            if (!mediaSources || mediaSources.length === 0) return '--';
            
            const maxShow = 2;
            const shown = mediaSources.slice(0, maxShow);
            const remaining = mediaSources.length - maxShow;
            
            let html = '<div class="media-tags">';
            shown.forEach(source => {
                html += `<span class="media-tag">${source}</span>`;
            });
            if (remaining > 0) {
                html += `<span class="media-tag more">+${remaining}</span>`;
            }
            html += '</div>';
            
            return html;
        }
        
        function renderFundingDetails(event) {
            if (event.type !== 'funding') return '--';
            
            let html = '';
            if (event.amount) {
                // 英文模式下翻译金额：亿 -> Billion
                let amountEn = event.amount;
                if (currentLang === 'en') {
                    amountEn = amountEn
                        .replace(/约/g, '~')
                        .replace(/([\d.]+)亿美元/g, '$$$1B USD')
                        .replace(/([\d.]+)亿人民币/g, '¥$1B')
                        .replace(/([\d.]+)亿/g, '¥$1B');
                }
                html += `<div class="funding-amount">${amountEn}</div>`;
            }
            if (event.valuation) {
                const valuationLabel = currentLang === 'en' ? 'Valuation: ' : '估值: ';
                let valuationEn = event.valuation;
                if (currentLang === 'en') {
                    valuationEn = valuationEn
                        .replace(/约/g, '~')
                        .replace(/([\d.]+)亿美元/g, '$$$1B USD')
                        .replace(/([\d.]+)亿人民币/g, '¥$1B')
                        .replace(/([\d.]+)亿/g, '¥$1B');
                }
                html += `<div class="valuation">${valuationLabel}${valuationEn}</div>`;
            }
            if (event.investors) {
                const investorsLabel = currentLang === 'en' ? 'Investors: ' : '';
                html += `<div class="investors">${investorsLabel}${event.investors}</div>`;
            }
            return html || '--';
        }
        
        // ==================== 分页 ====================
        function initPagination() {
            document.getElementById('prevPage').addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                    saveViewState();
                }
            });
            
            document.getElementById('nextPage').addEventListener('click', () => {
                const totalPages = Math.ceil(filteredEvents.length / pageSize);
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                    saveViewState();
                }
            });
        }
        
        function updatePagination() {
            const totalPages = Math.ceil(filteredEvents.length / pageSize);
            const t = i18n[currentLang];
            if (currentLang === 'en') {
                document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
            } else {
                document.getElementById('pageInfo').textContent = `第 ${currentPage} / ${totalPages} 页`;
            }
            document.getElementById('prevPage').disabled = currentPage <= 1;
            document.getElementById('nextPage').disabled = currentPage >= totalPages;
        }
        
        // ==================== 统计 ====================
        function updateStats() {
            document.getElementById('totalEvents').textContent = allEvents.length;
            
            const fundingCount = allEvents.filter(e => e.type === 'funding').length;
            document.getElementById('fundingCount').textContent = fundingCount;
            
            // 计算总监控公司数
            const companies = new Set(allEvents.map(e => e.company));
            document.getElementById('totalCompanies').textContent = Math.max(42, companies.size);
            
            // 本月新增计算
            const now = new Date();
            const thisMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            
            const thisMonthEvents = allEvents.filter(e => e.date && e.date.startsWith(thisMonth));
            const thisMonthFunding = thisMonthEvents.filter(e => e.type === 'funding').length;
            const thisMonthTotal = thisMonthEvents.length;
            
            // 本月新增公司
            const allTimeCompanies = new Set(allEvents.map(e => e.company));
            const thisMonthNewCompanies = new Set(thisMonthEvents.map(e => e.company));
            // 只统计本月有新事件的公司（不区分是否之前有事件，直观展示活跃公司数）
            const thisMonthActiveCompanies = thisMonthNewCompanies.size;
            
            // 更新融资本月新增
            const tMonth = currentLang === 'en' ? 'this month' : '本月';
            document.getElementById('fundingTrend').innerHTML = `+${thisMonthFunding} <span data-i18n="thisMonth">${tMonth}</span>`;
            
            // 更新总事件本月新增
            const eventsTrend = document.getElementById('eventsTrend');
            if (thisMonthTotal > 0) {
                eventsTrend.style.display = 'inline-block';
                eventsTrend.textContent = `+${thisMonthTotal} ${tMonth}`;
            }
            
            // 更新监控公司本月活跃
            const companiesTrend = document.getElementById('companiesTrend');
            if (thisMonthActiveCompanies > 0) {
                companiesTrend.style.display = 'inline-block';
                const activeLabel = currentLang === 'en' ? 'active this month' : '本月活跃';
                companiesTrend.textContent = `${thisMonthActiveCompanies} ${activeLabel}`;
            }
        }
        
        // ==================== 新公司探测 ====================
        function showNewCompaniesPanel() {
            const panel = document.getElementById('newCompaniesPanel');
            const list = document.getElementById('newCompaniesList');
            const count = document.getElementById('newCompaniesCount');
            
            // 只显示待处理的公司
            const pendingCompanies = potentialCompanies.filter(p => p.status === 'pending');
            count.textContent = pendingCompanies.length;
            panel.classList.remove('hidden');
            
            if (pendingCompanies.length === 0) {
                list.innerHTML = '<div class="empty-state">' + i18n[currentLang]['noNewCompanies'] + '</div>';
                return;
            }
            
            list.innerHTML = pendingCompanies.map((company, displayIndex) => `
                <div class="company-item">
                    <div class="company-info">
                        <div class="company-name">${company.name}</div>
                        <div class="company-meta">
                            ${currentLang === 'en' ? 'Found in:' : '发现于:'} ${company.discovered_from}
                            ${company.article_url ? `<br><a href="${company.article_url}" target="_blank">${currentLang === 'en' ? 'View source article →' : '查看来源文章 →'}</a>` : ''}

                        </div>
                    </div>
                    <div class="company-actions">
                        <button class="btn-add" onclick="addCompanyDirectly('${company.name}')">✓ ${currentLang === 'en' ? 'Add to Monitor' : '添加到监测'}</button>
                        <button class="btn-reject" onclick="rejectCompany('${company.name}')">✗ ${currentLang === 'en' ? 'Ignore' : '忽略'}</button>

                </div>
            `).join('');
        }
        
        function closeNewCompaniesPanel() {
            document.getElementById('newCompaniesPanel').classList.add('hidden');
        }
        
        // 直接添加公司到监测列表（使用公司名称查找）
        function addCompanyDirectly(name) {
            const company = potentialCompanies.find(p => p.name === name);
            if (!company) {
                alert('❌ ' + i18n[currentLang]['notFound']);
                return;
            }
            
            // 更新公司状态
            company.status = 'approved';
            
            // 自动添加到国内VLA列表（默认）
            if (!companyRegions['domestic_vla']) {
                companyRegions['domestic_vla'] = [];
            }
            if (!companyRegions['domestic_vla'].includes(name)) {
                companyRegions['domestic_vla'].push(name);
            }
            
            // 保存到 localStorage（持久化）
            saveCompanyRegionsToStorage();
            
            // 保存 potentialCompanies 状态
            savePotentialCompaniesToStorage();
            
            // 更新UI
            showNewCompaniesPanel();
            
            // 更新统计
            document.getElementById('totalCompanies').textContent = 
                parseInt(document.getElementById('totalCompanies').textContent) + 1;
            
            alert(`✅ "${name}" - ${i18n[currentLang]['addedToMonitor']}`);
        }
        
        function savePotentialCompaniesToStorage() {
            localStorage.setItem('potentialCompanies', JSON.stringify(potentialCompanies));
        }
        
        function loadPotentialCompaniesFromStorage() {
            const saved = localStorage.getItem('potentialCompanies');
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch (e) {
                    console.error('Failed to parse potential companies:', e);
                }
            }
            return null;
        }
        
        // 忽略公司（使用公司名称查找）
        function rejectCompany(name) {
            const company = potentialCompanies.find(p => p.name === name);
            if (!company) return;
            
            company.status = 'rejected';
            
            // 保存到 localStorage
            savePotentialCompaniesToStorage();
            
            // 更新UI
            showNewCompaniesPanel();
        }
        
        function detectNewCompanies() {
            if (!isAdmin) {
                alert(i18n[currentLang]['adminOnly']);
                return;
            }
            
            if (confirm(i18n[currentLang]['detectNewConfirm'])) {
                alert('🔍 ' + i18n[currentLang]['detectNewTip']);
            }
        }
        
        // 下载待添加的公司列表
        function downloadPendingCompanies() {
            // 收集所有状态为pending的公司
            const saved = loadPotentialCompaniesFromStorage() || potentialCompanies;
            const pending = saved.filter(c => c.status === 'pending');
            
            if (pending.length === 0) {
                alert(i18n[currentLang]['noPendingCompanies']);
                return;
            }
            
            // 生成文本内容
            const content = pending.map((c, i) => 
                `${i + 1}. ${c.name}\n   来源: ${c.discovered_from}\n   文章: ${c.article_title || '无'}\n   链接: ${c.article_url || '无'}\n`
            ).join('\n');
            
            const fullContent = `=== 具身智能媒体监测 - 待添加公司列表 ===\n生成时间: ${new Date().toLocaleString('zh-CN')}\n共 ${pending.length} 家公司\n\n${content}\n\n请复制以上内容发给AI助手进行添加。`;
            
            // 创建下载
            const blob = new Blob([fullContent], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = currentLang === 'en'
                ? `pending_companies_${new Date().toISOString().split('T')[0]}.txt`
                : `待添加公司_${new Date().toISOString().split('T')[0]}.txt`;
            link.click();
            URL.revokeObjectURL(link.href);
        }
        
        // ==================== 刷新 & 导出 ====================
        function refreshData() {
            if (confirm(i18n[currentLang]['confirmRefresh'])) {
                location.reload();
            }
        }
        
        function exportCSV() {
            const headers = currentLang === 'en'
                ? ['Date', 'Company', 'Type', 'Title', 'English Title', 'Source', 'Link', 'Media Coverage', 'Amount', 'Valuation', 'Investors']
                : ['日期', '公司', '类型', '标题', '英文标题', '来源', '链接', '媒体覆盖', '金额', '估值', '投资方'];
            const rows = filteredEvents.map(event => [
                event.date || '',
                event.company,
                typeNames[event.type] || event.type,
                event.title || '',
                event.title_en || '',
                event.source || '',
                event.source_url || '',
                (event.media_sources || []).join('; '),
                event.amount || '',
                event.valuation || '',
                event.investors || ''
            ]);
            
            const csvContent = [headers, ...rows]
                .map(row => row.map(cell => `"${(cell || '').replace(/"/g, '""')}"`).join(','))
                .join('\n');
            
            const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = currentLang === 'en'
                ? `embodied_ai_monitor_${new Date().toISOString().split('T')[0]}.csv`
                : `具身智能媒体监测_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }
        
        // ==================== 工具函数 ====================
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
    </script>
