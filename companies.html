<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>监测公司列表 - 具身智能媒体监测系统</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0e1a;
            color: #e0e6f0;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0d1117 0%, #161b2e 100%);
            border-bottom: 1px solid #1e2940;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #7ca4d4;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border: 1px solid #1e2940;
            border-radius: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .back-btn:hover { background: #1e2940; color: #a8c4e8; }
        .header-title { font-size: 18px; font-weight: 600; color: #c8d8f0; }
        .header-sub  { font-size: 13px; color: #5a7090; margin-left: 4px; }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

        /* Search */
        .search-wrap {
            position: relative;
        }
        .search-input {
            background: #0d1117;
            border: 1px solid #1e2940;
            border-radius: 8px;
            color: #c8d8f0;
            padding: 8px 12px 8px 34px;
            font-size: 13px;
            width: 200px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: #3a6ea8; }
        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #5a7090;
            font-size: 14px;
        }
        .count-badge {
            font-size: 13px;
            color: #5a7090;
        }
        .count-badge span { color: #7ca4d4; font-weight: 600; }

        /* Filter tabs */
        .filter-bar {
            padding: 12px 32px;
            background: #0d1117;
            border-bottom: 1px solid #1a2030;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #1e2940;
            background: transparent;
            color: #7a94b4;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #1e3050;
            border-color: #3a6ea8;
            color: #a8c4e8;
        }

        /* Table container */
        .table-container {
            padding: 20px 32px 40px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        thead th {
            background: #0d1117;
            color: #5a7090;
            font-weight: 500;
            padding: 10px 14px;
            text-align: left;
            border-bottom: 2px solid #1e2940;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        thead th:first-child { border-radius: 6px 0 0 0; }
        thead th:last-child  { border-radius: 0 6px 0 0; }

        tbody tr {
            border-bottom: 1px solid #121824;
            transition: background 0.15s;
        }
        tbody tr:hover { background: #111828; }
        tbody tr.hidden { display: none; }

        td {
            padding: 10px 14px;
            vertical-align: top;
        }

        /* Col 1: 公司名称 */
        .col-name { width: 160px; min-width: 140px; }
        .company-link {
            color: #7ca4d4;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            line-height: 1.4;
        }
        .company-link:hover { color: #a8c4e8; text-decoration: underline; }
        .region-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .region-dot.overseas { background: #4a8fd4; }
        .region-dot.domestic { background: #e85c45; }
        .row-index {
            color: #334060;
            font-size: 11px;
            margin-bottom: 2px;
        }

        /* Col 2-4: tags */
        .col-brain    { width: 200px; min-width: 160px; }
        .col-training { width: 220px; min-width: 180px; }
        .col-scene    { width: 200px; min-width: 160px; }
        .col-pos      { min-width: 220px; }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            line-height: 1.6;
            margin: 1px 2px 1px 0;
        }
        /* Brain arch color by type */
        .tag-e2e     { background: #0d2d4a; color: #5ab4f0; border: 1px solid #1e4a70; }
        .tag-hier    { background: #0d2a1a; color: #4acd8a; border: 1px solid #1a4a2a; }
        .tag-sim2rl  { background: #2a1a0d; color: #f09a4a; border: 1px solid #4a2a0d; }
        .tag-world   { background: #2a0d2a; color: #c87ae0; border: 1px solid #4a1a4a; }
        .tag-comp    { background: #1a2030; color: #8aa4c0; border: 1px solid #2a3850; }
        .tag-plat    { background: #0d1e2a; color: #4a9ad4; border: 1px solid #1a3a4a; }
        .tag-hub     { background: #1a1a0d; color: #d4b44a; border: 1px solid #3a3a0d; }
        .tag-cross   { background: #1a0d2a; color: #a07ad4; border: 1px solid #3a1a4a; }
        .tag-il      { background: #0d2a2a; color: #4ad4c8; border: 1px solid #1a4a4a; }
        .tag-vis     { background: #2a1a0d; color: #d4844a; border: 1px solid #4a2a0d; }
        .tag-intg    { background: #2a0d1a; color: #e07ab0; border: 1px solid #4a1a2a; }
        .tag-default { background: #141e2e; color: #8090b0; border: 1px solid #1e2e4a; }

        /* Training tags */
        .tag-train   { background: #1a2030; color: #90a8c8; border: 1px solid #2a3850; }

        /* Scene tags */
        .tag-scene   { background: #141e14; color: #88c888; border: 1px solid #224422; }

        /* Positioning */
        .pos-text {
            color: #7a90b0;
            font-size: 12px;
            line-height: 1.5;
        }
        .pos-key {
            color: #a0b8d8;
            font-weight: 600;
        }
        .no-tag { color: #334060; font-size: 12px; font-style: italic; }

        /* Empty state */
        .empty-row td {
            text-align: center;
            padding: 40px;
            color: #334060;
        }
    </style>
</head>
<body>

<!-- Filter bar -->

    <button class="filter-btn" onclick="setFilter('World Model', this)">[World Model]</button>
    <button class="filter-btn" onclick="setFilter('Component', this)">[Component]</button>
    <button class="filter-btn" onclick="setFilter('Platform', this)">[Platform]</button>
</div>

<!-- Table -->
<div class="table-container">
<table id="mainTable">

        </tr>
    </thead>
    <tbody id="tableBody">
    </tbody>
</table>
</div>

// 海外公司名单（tagData 里名称的首词全英文则判定为海外）
const OVERSEAS_SET = new Set([
    'NVIDIA (英伟达)', 'Tesla Optimus (特斯拉)', 'Figure AI', '1X Technologies',
    'Hexagon (海克斯康)', 'Skild AI', 'Physical Intelligence', 'Anybotics',
    'Mimic Robotics', 'Field AI', 'Agility Robotics', 'Sunday Robotics',
    'Boston Dynamics', 'Skydio', 'Sanctuary AI', 'Apptronik', 'Generalist'
]);

// 直接用 tagData 作为数据源，附加 overseas 标记
const allCompanies = tagData.map(t => ({
    ...t,
    overseas: OVERSEAS_SET.has(t.name)
}));

// 脑架构 → CSS class
function brainClass(brain) {
    if (!brain) return 'tag-default';
    if (brain.includes('E2E-VLA')) return 'tag-e2e';
    if (brain.includes('Hierarchical/RL')) return 'tag-sim2rl';
    if (brain.includes('Hierarchical')) return 'tag-hier';
    if (brain.includes('Sim2Real')) return 'tag-sim2rl';
    if (brain.includes('World Model')) return 'tag-world';
    if (brain.includes('Component')) return 'tag-comp';
    if (brain.includes('Platform-Hub')) return 'tag-hub';
    if (brain.includes('Platform') || brain.includes('Infra')) return 'tag-plat';
    if (brain.includes('Cross-Embodiment')) return 'tag-cross';
    if (brain.includes('IL-Teleop')) return 'tag-il';
    if (brain.includes('Brain-Vision')) return 'tag-vis';
    if (brain.includes('Integrated-OEM')) return 'tag-intg';
    return 'tag-default';
}

function renderTag(text, cls) {
    if (!text || text === '-') return '<span class="no-tag">—</span>';
    return `<span class="tag ${cls}">${text}</span>`;
}

function renderPos(pos) {
    if (!pos || pos === '-') return '<span class="no-tag">暂无数据</span>';
    // 拆分"[标签] 描述"格式
    const m = pos.match(/^(\[[\w\-]+\])\s+(.+)$/);
    if (m) {
        return `<span class="pos-text"><span class="pos-key">${m[1]}</span> ${m[2]}</span>`;
    }
    // "中文关键词 (英文)：描述" 格式
    return `<span class="pos-text">${pos}</span>`;
}

let activeFilter = 'all';

function renderTable() {
    const tbody = document.getElementById('tableBody');
    const search = document.getElementById('searchInput').value.trim().toLowerCase();

    let visCount = 0;
    const rows = allCompanies.map((c, i) => {
        const brain    = c.brain    || '-';
        const training = c.training || '-';
        const scene    = c.scene    || '-';
        const pos      = c.positioning || '-';

        // Filter logic
        const matchesSearch = !search || c.name.toLowerCase().includes(search)
            || brain.toLowerCase().includes(search)
            || scene.toLowerCase().includes(search)
            || training.toLowerCase().includes(search);
        let matchesFilter = true;
        if (activeFilter === 'overseas') matchesFilter = c.overseas;
        else if (activeFilter === 'domestic') matchesFilter = !c.overseas;
        else if (activeFilter !== 'all') {
            matchesFilter = brain.toLowerCase().includes(activeFilter.toLowerCase());
        }

        const visible = matchesSearch && matchesFilter;
        if (visible) visCount++;

        return `<tr class="${visible ? '' : 'hidden'}" data-overseas="${c.overseas}" data-brain="${brain}">
            <td style="color:#334060;font-size:11px;white-space:nowrap;">${i + 1}</td>
            <td class="col-name">
                <a href="company.html?name=${encodeURIComponent(c.name)}" class="company-link">
                    <span class="region-dot ${c.overseas ? 'overseas' : 'domestic'}"></span>
                    ${c.name}
                </a>
            </td>
            <td class="col-brain">${renderTag(brain, brainClass(brain))}</td>
            <td class="col-training">${renderTag(training, 'tag-train')}</td>
            <td class="col-scene">${renderTag(scene, 'tag-scene')}</td>
            <td class="col-pos">${renderPos(pos)}</td>
        </tr>`;
    });

    const emptyRow = visCount === 0
        ? `<tr class="empty-row"><td colspan="6">没有匹配的公司</td></tr>` : '';

    tbody.innerHTML = rows.join('') + emptyRow;
    document.getElementById('visibleCount').textContent = visCount;
    document.getElementById('totalCount').textContent   = allCompanies.length;
}

function filterTable() { renderTable(); }

function setFilter(val, btn) {
    activeFilter = val;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
}

// Init
renderTable();
</script>
