            display: flex;
            flex-direction: column;
        }

        /* ─── Header ─── */
        .header {
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 16px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        .back-btn {
            color: #7899d4;
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(120,153,212,0.3);
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(120,153,212,0.1); color: #a0bcf0; }
        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #c8d8ff;
        }
        .header-count {
            margin-left: auto;
            font-size: 12px;
            color: #6888b8;
            background: rgba(255,255,255,0.04);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* ─── Main Layout ─── */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            height: calc(100vh - 61px);
        }

        /* ─── Left Panel: Company List ─── */
        .company-list {
            width: 320px;
            min-width: 260px;
            border-right: 1px solid rgba(255,255,255,0.07);
            overflow-y: auto;
            background: rgba(255,255,255,0.02);
            flex-shrink: 0;
        }
        .company-list::-webkit-scrollbar { width: 4px; }
        .company-list::-webkit-scrollbar-track { background: transparent; }
        .company-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .list-search {
            position: sticky;
            top: 0;
            background: #0a0e1a;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            z-index: 10;
        }
        .list-search input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 7px 12px;
            color: #c8d8ff;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .list-search input:focus { border-color: rgba(120,153,212,0.5); }
        .list-search input::placeholder { color: #445577; }

        .company-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s;
            text-decoration: none;
        }
        .company-item:hover { background: rgba(120,153,212,0.07); }
        .company-item.active { background: rgba(120,153,212,0.14); border-left: 2px solid #7899d4; }

        .rank-num {
            font-size: 11px;
            color: #445577;
            min-width: 24px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .company-name {
            font-size: 13px;
            color: #c8d8ff;
            flex: 1;
            line-height: 1.4;
        }
        .company-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .badge-overseas {
            background: rgba(100,160,255,0.12);
            color: #6499d4;
            border: 1px solid rgba(100,160,255,0.2);
        }
        .badge-cn {
            background: rgba(255,160,80,0.1);
            color: #d47840;
            border: 1px solid rgba(255,160,80,0.2);
        }
        .has-tag-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #4a9a6a;
            flex-shrink: 0;
        }

        /* ─── Right Panel: Tag Detail ─── */
        .tag-panel {
            flex: 1;
            overflow-y: auto;
            padding: 32px 40px;
        }
        .tag-panel::-webkit-scrollbar { width: 4px; }
        .tag-panel::-webkit-scrollbar-track { background: transparent; }
        .tag-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #445577;
            gap: 12px;
        }
        .empty-state .icon { font-size: 48px; opacity: 0.4; }
        .empty-state p { font-size: 14px; }

        .tag-header {
            margin-bottom: 28px;
        }
        .tag-company-name {
            font-size: 24px;
            font-weight: 700;
            color: #e0e8ff;
            margin-bottom: 8px;
        }
        .tag-company-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #7899d4;
            text-decoration: none;
            font-size: 13px;
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid rgba(120,153,212,0.3);
            transition: all 0.2s;
        }
        .tag-company-link:hover { background: rgba(120,153,212,0.1); color: #a0bcf0; }

        .tag-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        @media (max-width: 900px) { .tag-grid { grid-template-columns: 1fr; } }

        .tag-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s;
        }
        .tag-card:hover { border-color: rgba(120,153,212,0.2); }
        .tag-card.full-width { grid-column: 1 / -1; }

        .tag-card-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #556688;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .tag-value {
            font-size: 15px;
            color: #c8d8ff;
            line-height: 1.5;
        }
        .tag-value .bracket-tag {
            display: inline-block;
            background: rgba(100,160,255,0.1);
            color: #7aadff;
            border: 1px solid rgba(100,160,255,0.2);
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 12px;
            margin-right: 6px;
            margin-bottom: 4px;
        }
        .tag-value .en-part {
            display: block;
            font-size: 11px;
            color: #6888b8;
            margin-top: 4px;
        }

        .rationale-card {
            background: rgba(120,153,212,0.05);
            border: 1px solid rgba(120,153,212,0.15);
        }
        .rationale-text {
            font-size: 14px;
            color: #c0d0f0;
            line-height: 1.7;
        }

        .no-tag-hint {
            background: rgba(255,255,255,0.03);
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            color: #445577;
            font-size: 13px;

            padding: 6px 16px 4px;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #334466;
            font-weight: 600;
            background: rgba(255,255,255,0.01);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            position: sticky;
            top: 52px;
            z-index: 9;
        }

        .hidden { display: none !important; }

// ─── 获取标签（支持模糊匹配）──────────────────────────────────────────────
function getTag(companyName) {
    // 精确匹配
    if (tagData[companyName]) return tagData[companyName];
    // 模糊匹配
    for (const key of Object.keys(tagData)) {
        if (companyName.includes(key) || key.includes(companyName)) {
            return tagData[key];
        }
    }
    return null;
}

// ─── 解析 bracket tags ────────────────────────────────────────────────────
function renderTagValue(raw) {
    if (!raw) return '<span style="color:#445577">—</span>';
    // 将 [xxx] 包裹成 badge
    const html = raw.replace(/\[([^\]]+)\]/g, '<span class="bracket-tag">[$1]</span>');
    return html;
}

// ─── 渲染公司列表 ─────────────────────────────────────────────────────────
function renderList(filter = '') {
    const container = document.getElementById('companyList');
    const search = container.querySelector('.list-search');
    
    // 清空，保留搜索框
    container.innerHTML = '';
    container.appendChild(search);

    const overseasList = allCompanies.filter(c => c.isOverseas);
    const cnList = allCompanies.filter(c => !c.isOverseas);
    const fl = filter.toLowerCase();

    let overseasShown = 0, cnShown = 0;

    function renderSection(list, labelText, isOverseas) {
        const divider = document.createElement('div');
        divider.className = 'section-divider';
        divider.textContent = labelText;
        container.appendChild(divider);

        let shown = 0;
        list.forEach((c, idx) => {
            if (fl && !c.company.toLowerCase().includes(fl)) return;
            shown++;
            const tag = getTag(c.company);
            const item = document.createElement('div');
            item.className = 'company-item';
            item.dataset.company = c.company;
            item.innerHTML = `
                <span class="rank-num">${String(idx + 1).padStart(2,'')}</span>
                <span class="company-name">${c.company}</span>
                ${tag ? '<span class="has-tag-dot" title="已打标签"></span>' : ''}
                <span class="company-badge ${isOverseas ? 'badge-overseas' : 'badge-cn'}">${isOverseas ? '海外' : '国内'}</span>
            `;
            item.addEventListener('click', () => selectCompany(c.company, item));
            container.appendChild(item);
        });
        return shown;
    }

    overseasShown = renderSection(overseasList, `海外公司 (${overseasList.length})`, true);
    cnShown = renderSection(cnList, `国内公司 (${cnList.length})`, false);

    document.getElementById('headerCount').textContent =
        `共 ${allCompanies.length} 家监测企业`;
}

// ─── 选中公司，展示标签 ──────────────────────────────────────────────────
let activeItem = null;

function selectCompany(name, el) {
    if (activeItem) activeItem.classList.remove('active');
    el.classList.add('active');
    activeItem = el;

    const tag = getTag(name);
    const panel = document.getElementById('tagPanel');

    if (!tag) {
        panel.innerHTML = `
            <div class="tag-header">
                <div class="tag-company-name">${name}</div>
                <a href="company.html?name=${encodeURIComponent(name)}" class="tag-company-link" target="_blank">
                    查看公司详情 →
                </a>
            </div>
            <div class="no-tag-hint">
                <p style="font-size:24px;margin-bottom:10px;">○</p>
                <p>该公司暂无标签数据</p>
                <p style="margin-top:6px;font-size:12px;color:#334466;">标签将根据分类逻辑逐步补充</p>
            </div>`;
        return;
    }

    panel.innerHTML = `
        <div class="tag-header">
            <div class="tag-company-name">${name}</div>
            <a href="company.html?name=${encodeURIComponent(name)}" class="tag-company-link" target="_blank">
                查看公司详情 →
            </a>
        </div>

        <div class="tag-grid">
            <div class="tag-card">
                <div class="tag-card-label">大脑架构 · Brain Architecture</div>
                <div class="tag-value">${renderTagValue(tag.brainArch)}</div>
            </div>
            <div class="tag-card">
                <div class="tag-card-label">训练与数据范式 · Training & Data Paradigm</div>
                <div class="tag-value">${renderTagValue(tag.trainingParadigm)}</div>
            </div>
            <div class="tag-card">
                <div class="tag-card-label">场景标签 · Scenario Labels</div>
                <div class="tag-value">${renderTagValue(tag.scenarioLabels)}</div>
            </div>
            <div class="tag-card rationale-card full-width">
                <div class="tag-card-label">核心逻辑与 FMC³ 关联 · Rationale</div>
                <div class="rationale-text">${tag.rationale}</div>
            </div>
        </div>`;
}

// ─── 搜索过滤 ─────────────────────────────────────────────────────────────
function filterList() {
    const q = document.getElementById('searchInput').value;
    const activeCompany = activeItem ? activeItem.dataset.company : null;
    renderList(q);
    // 恢复选中状态
    if (activeCompany) {
        const el = document.querySelector(`.company-item[data-company="${CSS.escape(activeCompany)}"]`);
        if (el) { el.classList.add('active'); activeItem = el; }
    }
}

// ─── 初始化 ───────────────────────────────────────────────────────────────
renderList();
</script>
